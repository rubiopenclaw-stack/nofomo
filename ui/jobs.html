<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>💼 職缺獵人 - Job Listings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary: #4F46E5; }
    body { background: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .job-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
    .tag { display: inline-block; background: #EEF2FF; color: #4F46E5; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3>💼 職缺獵人</h3>
      <button class="btn btn-primary" onclick="loadJobs()">
        <i class="bi bi-arrow-clockwise"></i> 刷新
      </button>
    </div>
    
    <div id="jobs-list">
      <div class="loading">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3">載入職缺中...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://remoteok.com/api';
    
    async function loadJobs() {
      const list = document.getElementById('jobs-list');
      list.innerHTML = '<div class="loading"><div class="spinner-border text-primary"></div><p class="mt-3">載入職缺中...</p></div>';
      
      try {
        const res = await fetch(API_BASE, {
          headers: { 'User-Agent': 'Mozilla/5.0' }
        });
        const jobs = await res.json();
        
        // Filter valid jobs
        const validJobs = jobs.filter(j => j.company && j.position && j.slug).slice(0, 30);
        
        if (validJobs.length === 0) {
          list.innerHTML = '<div class="alert alert-warning">無法載入職缺，請稍後再試</div>';
          return;
        }
        
        let html = '';
        validJobs.forEach(job => {
          const tags = (job.tags || []).slice(0, 6).map(t => `<span class="tag">${t}</span>`).join('');
          const url = job.apply_url || `https://remoteok.com/l/${job.slug}`;
          
          html += `
            <div class="job-card">
              <div class="d-flex justify-content-between">
                <div>
                  <h5 class="mb-1">${job.position}</h5>
                  <p class="mb-1 text-muted">${job.company}</p>
                </div>
                <div class="text-end">
                  <a href="${url}" target="_blank" class="btn btn-sm btn-outline-primary">申請</a>
                </div>
              </div>
              <div class="mt-2">${tags}</div>
            </div>
          `;
        });
        
        list.innerHTML = html;
      } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="alert alert-danger">載入失敗: ' + e.message + '</div>';
      }
    }
    
    loadJobs();
  </script>
</body>
</html>
