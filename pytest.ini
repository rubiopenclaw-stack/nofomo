[pytest]
# Pytest 配置文件

# 測試發現
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 輸出設置
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 標記定義
markers =
    unit: 單元測試
    integration: 整合測試
    slow: 慢速測試
    boundary: 邊界條件測試

# 日誌
log_cli = false
log_cli_level = INFO
